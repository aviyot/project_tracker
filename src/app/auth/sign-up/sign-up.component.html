<mat-card class="sign-up-card">
  <mat-card-title>הרשמה</mat-card-title>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="signUp()">
      <mat-form-field appearance="outline" style="width:100%">
        <mat-label>אימייל</mat-label>
        <input matInput formControlName="email" type="email" autocomplete="username">
        <mat-error *ngIf="form.get('email')?.hasError('required')">שדה חובה</mat-error>
        <mat-error *ngIf="form.get('email')?.hasError('email')">אימייל לא תקין</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" style="width:100%">
        <mat-label>סיסמא</mat-label>
        <input matInput formControlName="password" type="password" autocomplete="new-password">
        <mat-error *ngIf="form.get('password')?.hasError('required')">שדה חובה</mat-error>
        <mat-error *ngIf="form.get('password')?.hasError('minlength')">סיסמא קצרה מדי</mat-error>
      </mat-form-field>

      <div *ngIf="error" style="color: red; margin-bottom: 8px;">{{ error }}</div>

      <button mat-raised-button color="primary" type="submit" [disabled]="loading" style="width:100%">
        הרשמה
      </button>
    </form>
  </mat-card-content>
</mat-card>
