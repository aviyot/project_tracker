<mat-expansion-panel>
    <mat-expansion-panel-header>
        <mat-panel-title>
            {{selectedProject?.projectDesc?.name}}
        </mat-panel-title>
    </mat-expansion-panel-header>
    <div style="display: flex;flex-wrap: wrap;">
        <button mat-button [color]="project.id == selectedProject?.id ? 'primary':''"
            *ngFor="let project of projects;let i = index"
            (click)="selectProject(project.id)">{{project.projectDesc.name}}</button>
    </div>
    <div style="margin-top: 4px;">
        <button mat-button (click)="openDialog()"> <mat-icon>add</mat-icon></button>
    </div>

</mat-expansion-panel>

<app-project *ngIf="selectedProject" [selectedProject]="selectedProject">
</app-project>
